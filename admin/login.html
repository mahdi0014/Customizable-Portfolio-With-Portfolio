<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Admin Login | Digital Marketer Portfolio</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/admin.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="admin-login-body">
    <section class="admin-login-section">
      <div class="admin-login-card">
        <div class="login-brand">
          <div class="login-logo">DM</div>

          <div>
            <h1>Admin Panel</h1>
            <p>Digital Marketer Portfolio</p>
          </div>
        </div>

        <div class="login-heading">
          <span>Welcome Back</span>
          <h2>Login to Dashboard</h2>
          <p>Manage profile, services, projects, reviews, and messages.</p>
        </div>

        <form id="adminLoginForm" class="admin-login-form">
          <div class="admin-form-group">
            <label>Email Address</label>
            <input
              type="email"
              id="adminEmail"
              placeholder="admin@example.com"
              required
            />
          </div>

          <div class="admin-form-group">
            <label>Password</label>
            <input
              type="password"
              id="adminPassword"
              placeholder="Enter password"
              required
            />
          </div>

          <button type="submit" class="admin-btn admin-btn-primary">
            Login Now
          </button>
        </form>
      </div>
    </section>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/initial-data.js"></script>
    <script src="../assets/js/image-url-utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/admin.js?v=1.0.2"></script>
  </body>
</html>
